name: servicemate_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.5+3

environment:
  sdk: ">=3.8.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.0.5
  image_picker: ^1.0.4
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.6
  http: ^1.2.2
  pin_code_fields: ^8.0.1
  shared_preferences: ^2.2.3
  firebase_auth: ^6.0.0
  firebase_core: ^4.0.0
  flutter_svg: ^2.0.9
  url_launcher: ^6.2.6
  geocoding: ^3.0.0
  geolocator: ^13.0.0
  google_maps_flutter: ^2.6.0
  uuid: ^4.4.0
  google_sign_in: ^6.2.1
  carousel_slider: ^5.0.0
  marquee_widget: ^1.2.0
  firebase_messaging: ^16.0.1
  firebase_analytics: ^12.0.1
  google_places_flutter: ^2.1.1
  razorpay_flutter: ^1.3.6
  cloud_firestore: ^6.0.1
  flutter_dash: ^1.0.0
  

  # ✅ Use new Google Places SDK (compatible with http ^1.x)
  flutter_google_places_sdk: ^0.3.2+1

  flutter_local_notifications:
    git:
      url: https://github.com/MaikuB/flutter_local_notifications.git
      path: flutter_local_notifications
  flutter_polyline_points: ^3.0.1
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon4.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash.png
  android: true
  ios: true
  android_12:
    image: assets/images/splash.png
    icon_background_color: "#ffffff"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/problems/
    - assets/icon/
    - assets/partners/
    - assets/
